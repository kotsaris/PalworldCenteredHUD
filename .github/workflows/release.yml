name: release

on:
  push:
    branches:
      - main
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build archive
        run: zip -r CenteredHUD.zip CenteredHUD

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CenteredHUD
          path: CenteredHUD.zip

      - name: Create version release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: CenteredHUD.zip

      - name: Update latest build
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          files: CenteredHUD.zip
